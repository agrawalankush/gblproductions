
<div class="release-detail-premium" *ngIf="release">
  <div class="release-hero-wrapper">
    <div class="release-hero-bg" [style.background-image]="'url(' + release.coverArt + ')'"></div>
    <div class="release-hero-blur"></div>
    <div class="release-hero-main-container">
      <div class="release-hero-card">
        <div class="release-hero-content">
          <div class="release-hero-art">
            <img [src]="release.coverArt" alt="{{ release.title }} Album Art" class="release-hero-img">
          </div>
          <div class="release-hero-details">
            <h1 class="release-hero-title">{{ release.title }}</h1>
            <h2 class="release-hero-artist">{{ release.artist }}</h2>
            <div class="release-hero-platforms">
              <a [href]="release.links.youtube" target="_blank" *ngIf="release.links.youtube" class="platform-link youtube">
                <img src="assets/youtube_red.png" alt="YouTube">
              </a>
              <a [href]="release.links.youtubeMusic" target="_blank" *ngIf="release.links.youtubeMusic" class="platform-link youtube-music">
                <img src="assets/youtube_music_logo.svg" alt="YouTube Music">
              </a>
              <a [href]="release.links.spotify" target="_blank" *ngIf="release.links.spotify" class="platform-link spotify">
                <img src="assets/spotify_logo.svg" alt="Spotify">
              </a>
              <a [href]="release.links.appleMusic" target="_blank" *ngIf="release.links.appleMusic" class="platform-link apple">
                <img src="assets/apple_music_logo.svg" alt="Apple Music">
              </a>
              <a [href]="release.links.jiosaavan" target="_blank" *ngIf="release.links.jiosaavan" class="platform-link jio">
                <img src="assets/jio_savan_logo.png" alt="JioSaavan">
              </a>
              <a [href]="release.links.amazonMusic" target="_blank" *ngIf="release.links.amazonMusic" class="platform-link amazon">
                <img src="assets/amazon_music.webp" alt="Amazon Music">
              </a>
            </div>
            <!-- YouTube Player & Synced Lyrics -->
            <div class="release-hero-media">
              <div class="youtube-player-container" *ngIf="release.links.youtube_id">
                <iframe 
                  [src]="getYouTubeEmbedUrl(release.links.youtube_id) | safe"
                  width="100%" 
                  height="280" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen>
                </iframe>
              </div>
              <div class="release-hero-lyrics-card">
                <h3>Lyrics</h3>
                <div class="release-hero-lyrics-scroll">
                  <pre class="release-hero-lyrics">{{ release.lyrics }}</pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="release-bts-section" *ngIf="release.behindTheScenes && release.behindTheScenes.images && release.behindTheScenes.images.length > 0">
    <h3>Behind The Scenes</h3>
    <p *ngIf="release.behindTheScenes.description">{{ release.behindTheScenes.description }}</p>
    <div class="bts-carousel">
      <div class="bts-carousel-track">
        <img *ngFor="let image of release.behindTheScenes.images" [src]="image" alt="Behind the scenes image">
      </div>
    </div>
  </div>
</div>
