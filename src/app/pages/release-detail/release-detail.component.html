<div class="release-detail-premium" *ngIf="release">
  <div class="release-hero-wrapper">
    <div class="release-hero-bg" [style.background-image]="'url(' + release.coverArt + ')'"></div>
    <div class="release-hero-blur"></div>
    
    <div class="release-content-grid">
      <!-- Secondary Navigation Pill -->
      <div class="secondary-toolbar-pill">
        <div class="other-releases-nav">
          <a *ngFor="let item of allReleases" 
             [routerLink]="['/release', item.id]" 
             routerLinkActive="active" 
             class="other-release-link-img"
             [title]="item.title">
            <img [src]="item.coverArt" [alt]="item.title" class="nav-cover-art">
          </a>
        </div>
      </div>
      <!-- Media/YouTube Panel -->
      <div class="premium-glass-panel youtube-panel" *ngIf="release.links.youtube_id">
        <div class="youtube-container">
          <div class="thumbnail-wrapper" *ngIf="!isPlayerOpen">
            <img [src]="getYouTubeThumbnail(release.links.youtube_id)" alt="YouTube Thumbnail" class="youtube-thumbnail">
            <div class="play-button-overlay" (click)="togglePlayer()">
              <div class="play-button">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="youtube-player-wrapper" *ngIf="isPlayerOpen">
            <div class="youtube-player-container" [attr.id]="'yt-player-' + release.id"></div>
          </div>
        </div>
      </div>

      <!-- Links Panel -->
      <div class="premium-glass-panel stream-links-panel">
        <div class="stream-links-section">
          <h3>Stream On</h3>
          <div class="stream-links">
            <a [href]="release.links.youtube" target="_blank" *ngIf="release.links.youtube" class="stream-link youtube" title="YouTube">
              <img src="assets/youtube_red.png" alt="YouTube"><span>YouTube</span>
            </a>
            <a [href]="release.links.youtubeMusic" target="_blank" *ngIf="release.links.youtubeMusic" class="stream-link youtube-music" title="YouTube Music">
              <img src="assets/youtube_music_logo.svg" alt="YouTube Music"><span>YouTube Music</span>
            </a>
            <a [href]="release.links.spotify" target="_blank" *ngIf="release.links.spotify" class="stream-link spotify" title="Spotify">
              <img src="assets/spotify_logo.svg" alt="Spotify"><span>Spotify</span>
            </a>
            <a [href]="release.links.appleMusic" target="_blank" *ngIf="release.links.appleMusic" class="stream-link apple" title="Apple Music">
              <img src="assets/apple_music_logo.svg" alt="Apple Music"><span>Apple Music</span>
            </a>
            <a [href]="release.links.jiosaavan" target="_blank" *ngIf="release.links.jiosaavan" class="stream-link jio" title="JioSaavan">
              <img src="assets/jio_savan_logo.png" alt="JioSaavan"><span>JioSaavan</span>
            </a>
            <a [href]="release.links.amazonMusic" target="_blank" *ngIf="release.links.amazonMusic" class="stream-link amazon" title="Amazon Music">
              <img src="assets/amazon_music.webp" alt="Amazon Music"><span>Amazon Music</span>
            </a>
          </div>
        </div>
      </div>

      <!-- Lyrics Panel -->
      <div class="premium-glass-panel lyrics-panel">
        <div class="lyrics-section">
          <h3>Lyrics</h3>
          <div class="lyrics-scroll">
            <pre class="lyrics-text">{{ release.lyrics }}</pre>
          </div>
        </div>
      </div>

      <!-- Making Of Panel -->
      <div class="premium-glass-panel bts-panel" *ngIf="release.behindTheScenes && release.behindTheScenes.images && release.behindTheScenes.images.length > 0">
        <div class="release-bts-section">
          <h3>Making of {{ release.title }}</h3>
          <p *ngIf="release.behindTheScenes.description">{{ release.behindTheScenes.description }}</p>
          <div class="bts-carousel">
            <div class="bts-carousel-track">
              <img *ngFor="let image of release.behindTheScenes.images" [src]="image" alt="Behind the scenes image">
            </div>
          </div>
        </div>
      </div>
    </div>
</div>
