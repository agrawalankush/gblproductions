<div class="releases-container">
  <div class="release-grid">
    <a *ngFor="let release of releases" [routerLink]="['/release', release.id]">
      <mat-card>
        <div class="release-cover-art-container">
          <img mat-card-image [src]="release.coverArt" alt="{{ release.title }} Album Art">
        </div>
        <mat-card-content>
          <h3>{{ release.title }}</h3>
          <p class="release-artist">{{ release.artist }}</p>
          <p class="release-date">{{ release.releaseDate | date:'mediumDate' }}</p>
        </mat-card-content>
      </mat-card>
    </a>
  </div>
</div>
